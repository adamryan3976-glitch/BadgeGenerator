<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Badge Generator</title>
    <style id="dynamic-layout">
        /* Default Avery 5395 styles - these are updated via JS */
        :root {
            --label-width: 3.375in;
            --label-height: 2.333in;
            --page-top: 0.5in;
            --page-left: 0.5625in;
            --col-gap: 0.625in;
            --row-gap: 0.167in;
        }

        @page { size: letter; margin: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; }

        .page {
            width: 8.5in;
            height: 11in;
            padding-top: var(--page-top);
            padding-left: var(--page-left);
            padding-right: var(--page-left);
            background: white;
            display: grid;
            grid-template-columns: var(--label-width) var(--label-width);
            grid-template-rows: repeat(4, var(--label-height));
            column-gap: var(--col-gap);
            row-gap: var(--row-gap);
            box-sizing: border-box;
            page-break-after: always;
        }

        .badge {
            width: var(--label-width);
            height: var(--label-height);
            border: 1px dashed #ddd;
            padding: 0.15in;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            background-color: #fff;
            position: relative;
            overflow: hidden;
        }

        .badge.no-media {
            background-color: #ff66b2 !important;
            border: 2px solid #ff1493;
        }

        @media print {
            body { background: none; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .badge { border: none; }
            #ui-sidebar { display: none; }
        }

        /* Branding & Layout */
        .header { display: flex; align-items: center; border-bottom: 2px solid #8B0000; padding-bottom: 4px; margin-bottom: 6px; }
        .logo { height: 0.45in; width: auto; margin-right: 10px; object-fit: contain; }
        .event-title { font-size: 9pt; font-weight: bold; color: #333; line-height: 1.1; flex: 1; }
        
        .student-name { font-size: 13pt; font-weight: 900; text-transform: uppercase; margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .student-info { font-size: 8pt; color: #555; margin-bottom: 2px; }
        .sessions-container { background-color: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); border-radius: 4px; padding: 4px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .session-row { display: flex; font-size: 7.5pt; margin-bottom: 1px; }
        .session-label { font-weight: bold; color: #8B0000; margin-right: 5px; min-width: 65px; }

        /* UI Sidebar */
        #ui-sidebar {
            position: fixed; top: 0; left: 0; width: 320px; height: 100vh;
            background: #1a1a1b; color: #e4e6eb; padding: 20px; overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3); z-index: 1000;
        }
        #badge-container { margin-left: 320px; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        @media print { #badge-container { margin-left: 0; padding: 0; } }

        .control-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #b0b3b8; text-transform: uppercase; }
        select, input, button { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #333; background: #242526; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn-primary { background: #8B0000; border: none; font-weight: bold; cursor: pointer; padding: 12px; margin-top: 10px; }
        .btn-primary:hover { background: #a00000; }
        .mapping-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .mapping-row span { font-size: 11px; flex: 1; }
        .mapping-row select { width: 60%; margin-bottom: 0; font-size: 11px; }
    </style>
</head>
<body>

    <div id="ui-sidebar">
        <h2 style="margin-top:0; color: #fff;">Badge Studio</h2>
        
        <div class="control-group">
            <label>1. Label Template</label>
            <select id="templateSelector">
                <option value="5395">Avery 5395 (8 labels/sheet)</option>
                <option value="5160">Avery 5160 (30 labels/sheet)</option>
                <option value="5163">Avery 5163 (10 labels/sheet)</option>
            </select>
        </div>

        <div class="control-group">
            <label>2. Branding</label>
            <input type="text" id="eventTitleInput" placeholder="Event Title" value="DDSB Indigenous Celebration Day">
            <input type="file" id="logoInput" accept="image/*">
        </div>

        <div class="control-group">
            <label>3. Data Source</label>
            <input type="file" id="csvInput" accept=".csv">
            <div id="mapping-container" style="display:none;">
                <label style="color: #4bb543;">Map Columns:</label>
                <div id="column-mappings"></div>
            </div>
        </div>

        <div class="control-group">
            <label>4. Blank Badges</label>
            <input type="number" id="blankCount" value="0" min="0" placeholder="Qty of blanks">
        </div>

        <button class="btn-primary" id="printBtn" onclick="window.print()">PRINT BADGES</button>
        <p id="status" style="font-size:11px; color: #888;"></p>
    </div>

    <div id="badge-container">
        <div class="page" id="preview-placeholder">
            <div style="grid-column: 1 / -1; display: flex; align-items: center; justify-content: center; color: #999;">
                Upload a CSV to generate badges
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_LOGO = "https://lh3.googleusercontent.com/d/1Tl0C8dOaA5aT3dwwfzyWJP7KNrkeiwx5";
        let currentLogo = DEFAULT_LOGO;
        let csvData = [];
        let headers = [];
        
        const templates = {
            "5395": { w: "3.375in", h: "2.333in", top: "0.5in", left: "0.5625in", colG: "0.625in", rowG: "0.167in", cols: 2, rows: 4, perPage: 8 },
            "5160": { w: "2.625in", h: "1.0in", top: "0.5in", left: "0.219in", colG: "0.125in", rowG: "0in", cols: 3, rows: 10, perPage: 30 },
            "5163": { w: "4.0in", h: "2.0in", top: "0.5in", left: "0.156in", colG: "0.188in", rowG: "0in", cols: 2, rows: 5, perPage: 10 }
        };

        const mappings = {
            name: { label: "Full Name", index: -1 },
            info1: { label: "Info Line 1 (School)", index: -1 },
            info2: { label: "Info Line 2 (Grade)", index: -1 },
            sub: { label: "Subtext (Supervisor)", index: -1 },
            media: { label: "Media Release Col", index: -1 },
            s1: { label: "Session 1", index: -1 },
            s1l: { label: "S1 Location", index: -1 },
            s2: { label: "Session 2", index: -1 },
            s2l: { label: "S2 Location", index: -1 }
        };

        // Handle Template Change
        document.getElementById('templateSelector').addEventListener('change', (e) => {
            const t = templates[e.target.value];
            const root = document.documentElement;
            root.style.setProperty('--label-width', t.w);
            root.style.setProperty('--label-height', t.h);
            root.style.setProperty('--page-top', t.top);
            root.style.setProperty('--page-left', t.left);
            root.style.setProperty('--col-gap', t.colG);
            root.style.setProperty('--row-gap', t.rowG);
            
            const style = document.getElementById('dynamic-layout');
            style.innerHTML = style.innerHTML.replace(/grid-template-columns:.*?;/, `grid-template-columns: repeat(${t.cols}, var(--label-width));`);
            style.innerHTML = style.innerHTML.replace(/grid-template-rows:.*?;/, `grid-template-rows: repeat(${t.rows}, var(--label-height));`);
            
            render();
        });

        // Handle Logo Upload
        document.getElementById('logoInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { currentLogo = ev.target.result; render(); };
                reader.readAsDataURL(file);
            }
        });

        // Handle CSV Upload
        document.getElementById('csvInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const lines = ev.target.result.split(/\r?\n/);
                    headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.replace(/"/g, '').trim());
                    csvData = lines.slice(1).map(line => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
                    setupMappingUI();
                };
                reader.readAsText(file);
            }
        });

        document.getElementById('blankCount').addEventListener('input', render);
        document.getElementById('eventTitleInput').addEventListener('input', render);

        function setupMappingUI() {
            const container = document.getElementById('column-mappings');
            const wrapper = document.getElementById('mapping-container');
            container.innerHTML = '';
            wrapper.style.display = 'block';

            Object.keys(mappings).forEach(key => {
                const row = document.createElement('div');
                row.className = 'mapping-row';
                
                // Try to guess index
                let guessedIndex = headers.findIndex(h => h.toLowerCase().includes(key === 'name' ? 'name' : key));
                if (key === 'media') guessedIndex = headers.findIndex(h => h.toLowerCase().includes('media'));
                
                let options = `<option value="-1">-- Skip --</option>`;
                headers.forEach((h, i) => {
                    options += `<option value="${i}" ${i === guessedIndex ? 'selected' : ''}>${h}</option>`;
                });

                row.innerHTML = `<span>${mappings[key].label}</span><select id="map-${key}">${options}</select>`;
                container.appendChild(row);

                row.querySelector('select').addEventListener('change', (e) => {
                    mappings[key].index = parseInt(e.target.value);
                    render();
                });
                // Initialize
                mappings[key].index = guessedIndex;
            });
            render();
        }

        function createBadgeHTML(data = null) {
            const eventTitle = document.getElementById('eventTitleInput').value;
            let noMedia = false;
            
            if (data && mappings.media.index !== -1) {
                const val = (data[mappings.media.index] || "").toLowerCase();
                if (val !== "yes" && val !== "") noMedia = true;
            }

            const getVal = (key) => (data && mappings[key].index !== -1) ? data[mappings[key].index] : "";

            return `
                <div class="badge ${noMedia ? 'no-media' : ''}">
                    <div class="header">
                        <img src="${currentLogo}" class="logo" onerror="this.src='${DEFAULT_LOGO}'">
                        <div class="event-title">${eventTitle}</div>
                    </div>
                    <div class="student-name">${getVal('name') || "________________"}</div>
                    <div class="student-info">
                        ${getVal('info1')} ${getVal('info2') ? '&bull; ' + getVal('info2') : ''}
                        ${!data ? '____________________' : ''}
                    </div>
                    <div class="supervisor" style="font-size: 7pt;">${getVal('sub') ? 'Supervisor: ' + getVal('sub') : ''}</div>
                    <div class="sessions-container">
                        <div class="session-row">
                            <span class="session-label">Session 1:</span>
                            <span style="flex:1">${getVal('s1')}</span>
                            <span style="font-style:italic">${getVal('s1l')}</span>
                        </div>
                        <div class="session-row">
                            <span class="session-label">Session 2:</span>
                            <span style="flex:1">${getVal('s2')}</span>
                            <span style="font-style:italic">${getVal('s2l')}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const container = document.getElementById('badge-container');
            container.innerHTML = '';
            
            const tid = document.getElementById('templateSelector').value;
            const t = templates[tid];
            const blankCount = parseInt(document.getElementById('blankCount').value) || 0;
            
            let allItems = [...csvData];
            for(let i=0; i<blankCount; i++) allItems.push(null);

            if (allItems.length === 0) {
                container.innerHTML = '<div class="page"><div style="grid-column: 1/-1; display:flex; align-items:center; justify-content:center; color:#999;">Ready for data...</div></div>';
                return;
            }

            for (let i = 0; i < allItems.length; i += t.perPage) {
                const page = document.createElement('div');
                page.className = 'page';
                const chunk = allItems.slice(i, i + t.perPage);
                page.innerHTML = chunk.map(item => createBadgeHTML(item)).join('');
                container.appendChild(page);
            }

            document.getElementById('status').textContent = `Total Items: ${allItems.length} (${csvData.length} data + ${blankCount} blanks)`;
        }
    </script>
</body>
</html>
