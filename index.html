<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ADAMS BADGE GENERATOR</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://github.com/adamryan3976-glitch/BadgeGenerator/blob/main/Badge%20Generator%20Logo.png?raw=true">
    
    <style id="dynamic-layout">
        :root {
            --label-width: 3.375in;
            --label-height: 2.333in;
            --page-top: 0.5in;
            --page-left: 0.5625in;
            --col-gap: 0.625in;
            --row-gap: 0.167in;
            --cols: 2;
            /* Enhanced dynamic sizing defaults */
            --agenda-font-size: 10pt;
        }

        @page { size: letter; margin: 0; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; }

        .page {
            width: 8.5in;
            height: 11in;
            padding-top: var(--page-top);
            padding-left: var(--page-left);
            padding-right: var(--page-left);
            background: white;
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--label-width));
            column-gap: var(--col-gap);
            row-gap: var(--row-gap);
            box-sizing: border-box;
            page-break-after: always;
            align-content: start;
        }

        .badge {
            width: var(--label-width);
            height: var(--label-height);
            border: 1px dashed #ddd;
            padding: 0.1in;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            background-color: #fff;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
        }

        .badge.has-bg::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.75); 
            z-index: 0;
        }

        .badge > * { position: relative; z-index: 1; }

        .badge.no-media:not(.has-bg) {
            background-color: #FFF0F5 !important;
            border: 2.5px solid #FF1493 !important;
        }

        @media print {
            body { background: none; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .badge { border: none !important; }
            #ui-sidebar { display: none !important; }
            #badge-container { margin-left: 0 !important; padding: 0 !important; }
        }

        .header { display: flex; align-items: center; border-bottom: 2px solid #8B0000; padding-bottom: 2px; margin-bottom: 3px; }
        .logo { height: 0.35in; width: auto; margin-right: 8px; object-fit: contain; }
        .event-title { font-size: 8pt; font-weight: bold; color: #333; line-height: 1.1; flex: 1; text-transform: uppercase; }
        
        .student-name { font-size: 13pt; font-weight: 900; text-transform: uppercase; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #000; }
        .student-info { font-size: 8pt; color: #444; margin-bottom: 1px; font-weight: 600; }
        .supervisor { font-size: 7pt; font-style: italic; color: #666; margin-bottom: 3px; height: 12px; overflow: hidden; }

        /* Agenda Section - Optimized for Readability */
        .sessions-container { 
            background-color: rgba(255, 255, 255, 0.8); 
            border: 1px solid rgba(0,0,0,0.1); 
            border-radius: 4px; 
            padding: 3px 5px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; /* Start from top to maximize space */
            gap: 4px;
            overflow: hidden;
        }

        .session-row { 
            display: flex;
            flex-direction: column; /* Stack label and activity to allow full width wrapping */
            font-size: var(--agenda-font-size); 
            line-height: 1.1; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 2px;
        }
        .session-row:last-child { border-bottom: none; }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .session-label { 
            font-weight: 800; 
            color: #8B0000; 
            font-size: 0.85em; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .session-loc { 
            color: #444; 
            font-style: italic; 
            font-size: 0.85em; 
            font-weight: bold;
        }

        .session-activity { 
            font-weight: 700; 
            color: #111;
            word-wrap: break-word; /* Ensure long words wrap */
            overflow-wrap: break-word;
            display: block;
            width: 100%;
        }

        /* UI Sidebar Styles */
        #ui-sidebar {
            position: fixed; top: 0; left: 0; width: 340px; height: 100vh;
            background: #1a1a1b; color: #e4e6eb; padding: 15px; overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3); z-index: 1000;
            box-sizing: border-box;
        }
        #badge-container { margin-left: 340px; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .control-group { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #b0b3b8; text-transform: uppercase; }
        select, input, button { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #333; background: #242526; color: white; margin-bottom: 8px; box-sizing: border-box; font-size: 13px; }
        .btn-magic { background: #E91E63; border: none; font-weight: 900; cursor: pointer; padding: 16px; margin-top: 10px; color: white; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4); }
        .btn-print { background: #333; border: 1px solid #444; color: #fff; cursor: pointer; padding: 8px; margin-top: 5px; font-weight: bold; }
        .template-info { font-size: 11px; color: #4bb543; margin-top: -5px; margin-bottom: 10px; min-height: 14px; }
        .template-dims { font-size: 12px; font-weight: bold; color: #ffcc00; margin-bottom: 10px; }
        .mapping-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .mapping-row span { font-size: 11px; flex: 1; }
        .mapping-row select { width: 60%; margin-bottom: 0; font-size: 11px; padding: 4px; }
        .agenda-builder-row { background: #2a2a2b; padding: 8px; border-radius: 4px; margin-bottom: 10px; border-left: 3px solid #8B0000; }
        .agenda-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    </style>
</head>
<body>

    <div id="ui-sidebar">
        <h2 style="margin-top:0; color: #fff; font-size: 18px;">THE ADAMS BADGE GENERATOR</h2>
        
        <div class="control-group">
            <label>1. Avery Template Code</label>
            <input type="text" id="templateSearch" placeholder="Enter code (e.g. 5395)" value="">
            <div id="templateFeedback" class="template-info"></div>
            <div id="templateDims" class="template-dims"></div>
        </div>

        <div class="control-group">
            <label>2. Branding & Backgrounds</label>
            <input type="text" id="eventTitleInput" placeholder="Enter Event Title" value="">
            <div class="file-input-wrapper" style="font-size:10px; color:#888;">
                <span>Corner Logo:</span>
                <input type="file" id="logoInput" accept="image/*">
                <span>BG (Media YES):</span>
                <input type="file" id="bgYesInput" accept="image/*">
                <span>BG (Media NO):</span>
                <input type="file" id="bgNoInput" accept="image/*">
            </div>
        </div>

        <div class="control-group">
            <label>3. Data Source (CSV)</label>
            <input type="file" id="csvInput" accept=".csv">
            <div id="mapping-container" style="display:none;">
                <div id="column-mappings"></div>
            </div>
        </div>

        <div class="control-group">
            <label>4. Agenda Builder</label>
            <div id="agenda-rows-container"></div>
            <button onclick="addAgendaRow()" style="background: #3a3b3c; border: 1px solid #444; color: #ddd; font-size: 11px; padding: 5px; cursor: pointer;">+ Add Agenda Row</button>
        </div>

        <div class="control-group">
            <label>5. Blanks</label>
            <input type="number" id="blankCount" value="0" min="0">
        </div>

        <button class="btn-magic" onclick="render()">APPLY ADAMS MAGIC</button>
        <button class="btn-print" onclick="window.print()">PRINT PREVIEW</button>
        <p id="status" style="font-size:11px; color: #888; margin-top: 10px;"></p>
    </div>

    <div id="badge-container">
        <div class="page">
            <div style="grid-column: 1 / -1; display: flex; align-items: center; justify-content: center; color: #999; padding-top: 2in; text-align: center;">
                Configure settings & click "APPLY ADAMS MAGIC".
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_LOGO = "https://github.com/adamryan3976-glitch/BadgeGenerator/blob/main/Badge%20Generator%20Logo.png?raw=true";
        let currentLogo = DEFAULT_LOGO;
        let backgroundYes = null;
        let backgroundNo = null;
        let csvData = [];
        let headers = [];
        
        let agendaConfig = [
            { title: "Session 1", activityIdx: -1, locationIdx: -1 },
            { title: "Session 2", activityIdx: -1, locationIdx: -1 }
        ];

        const templates = {
            "5395": { name: "Avery 5395", w: "3.375in", h: "2.333in", top: "0.5in", left: "0.5625in", colG: "0.625in", rowG: "0.167in", cols: 2, rows: 4, perPage: 8 },
            "5392": { name: "Avery 5392", w: "4.0in", h: "3.0in", top: "1.0in", left: "0.25in", colG: "0in", rowG: "0in", cols: 2, rows: 3, perPage: 6 },
            "5160": { name: "Avery 5160", w: "2.625in", h: "1.0in", top: "0.5in", left: "0.219in", colG: "0.125in", rowG: "0in", cols: 3, rows: 10, perPage: 30 },
            "5163": { name: "Avery 5163", w: "4.0in", h: "2.0in", top: "0.5in", left: "0.156in", colG: "0.188in", rowG: "0in", cols: 2, rows: 5, perPage: 10 },
            "5164": { name: "Avery 5164", w: "4.0in", h: "3.33in", top: "0.5in", left: "0.25in", colG: "0in", rowG: "0in", cols: 2, rows: 3, perPage: 6 },
            "7447": { name: "Avery 7447", w: "3.0in", h: "4.0in", top: "0.75in", left: "1.25in", colG: "0in", rowG: "0in", cols: 2, rows: 2, perPage: 4 }
        };

        const globalMappings = {
            name: { label: "Full Name", index: -1 },
            info1: { label: "Info 1 (School)", index: -1 },
            info2: { label: "Info 2 (Grade)", index: -1 },
            sub: { label: "Supervisor", index: -1 },
            media: { label: "Media Release", index: -1 }
        };

        function addAgendaRow() {
            agendaConfig.push({ title: "New Item", activityIdx: -1, locationIdx: -1 });
            renderAgendaBuilder();
        }

        function removeAgendaRow(idx) {
            agendaConfig.splice(idx, 1);
            renderAgendaBuilder();
        }

        // Maximizing the font size dynamically based on row count
        function updateDynamicStyles() {
            const count = agendaConfig.length;
            const root = document.documentElement;
            let size = "9pt";
            if (count <= 1) size = "14pt";
            else if (count === 2) size = "12pt";
            else if (count === 3) size = "10.5pt";
            else if (count === 4) size = "9.5pt";
            else if (count === 5) size = "8.5pt";
            else size = "7.5pt";
            root.style.setProperty('--agenda-font-size', size);
        }

        function renderAgendaBuilder() {
            const container = document.getElementById('agenda-rows-container');
            container.innerHTML = '';
            agendaConfig.forEach((row, idx) => {
                const div = document.createElement('div');
                div.className = 'agenda-builder-row';
                let activityOptions = `<option value="-1">-- Activity --</option>`;
                let locationOptions = `<option value="-1">-- Location --</option>`;
                headers.forEach((h, hIdx) => {
                    activityOptions += `<option value="${hIdx}" ${hIdx === row.activityIdx ? 'selected' : ''}>${h}</option>`;
                    locationOptions += `<option value="${hIdx}" ${hIdx === row.locationIdx ? 'selected' : ''}>${h}</option>`;
                });
                div.innerHTML = `
                    <input type="text" value="${row.title}" oninput="agendaConfig[${idx}].title = this.value;" placeholder="Label">
                    <div class="agenda-grid">
                        <select onchange="agendaConfig[${idx}].activityIdx = parseInt(this.value);">${activityOptions}</select>
                        <select onchange="agendaConfig[${idx}].locationIdx = parseInt(this.value);">${locationOptions}</select>
                    </div>
                    <button style="background:#444; border:none; color:#ff9999; font-size:10px; margin-top:5px; cursor:pointer;" onclick="removeAgendaRow(${idx})">Remove</button>
                `;
                container.appendChild(div);
            });
        }

        document.getElementById('templateSearch').addEventListener('input', (e) => {
            const code = e.target.value.trim();
            const feedback = document.getElementById('templateFeedback');
            const dims = document.getElementById('templateDims');
            if (templates[code]) {
                const t = templates[code];
                const root = document.documentElement;
                root.style.setProperty('--label-width', t.w);
                root.style.setProperty('--label-height', t.h);
                root.style.setProperty('--page-top', t.top);
                root.style.setProperty('--page-left', t.left);
                root.style.setProperty('--col-gap', t.colG);
                root.style.setProperty('--row-gap', t.rowG);
                root.style.setProperty('--cols', t.cols);
                feedback.textContent = `Template: ${t.name}`;
                dims.textContent = `Size: ${t.w} x ${t.h}`;
            }
        });

        // Background / Logo logic
        const setupFileHandler = (id, targetVar) => {
            document.getElementById(id).addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { 
                        if (id === 'logoInput') currentLogo = ev.target.result;
                        if (id === 'bgYesInput') backgroundYes = ev.target.result;
                        if (id === 'bgNoInput') backgroundNo = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        };
        setupFileHandler('logoInput'); setupFileHandler('bgYesInput'); setupFileHandler('bgNoInput');

        document.getElementById('csvInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
                    headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.replace(/"/g, '').trim());
                    csvData = lines.slice(1).map(line => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
                    
                    Object.keys(globalMappings).forEach(key => {
                        globalMappings[key].index = headers.findIndex(h => h.toLowerCase().includes(key === 'name' ? 'name' : (key === 'info1' ? 'school' : (key === 'info2' ? 'grade' : key))));
                    });
                    
                    document.getElementById('mapping-container').style.display = 'block';
                    const mc = document.getElementById('column-mappings');
                    mc.innerHTML = '';
                    Object.keys(globalMappings).forEach(k => {
                        let opts = `<option value="-1">Skip</option>` + headers.map((h, i) => `<option value="${i}" ${i === globalMappings[k].index ? 'selected' : ''}>${h}</option>`).join('');
                        mc.innerHTML += `<div class="mapping-row"><span>${globalMappings[k].label}</span><select onchange="globalMappings['${k}'].index=parseInt(this.value)">${opts}</select></div>`;
                    });
                    renderAgendaBuilder();
                };
                reader.readAsText(file);
            }
        });

        function createBadgeHTML(data = null) {
            const eventTitle = document.getElementById('eventTitleInput').value;
            let noMedia = false;
            if (data && globalMappings.media.index !== -1) {
                const val = (data[globalMappings.media.index] || "").toLowerCase();
                if (val !== "yes" && val !== "" && val !== "y" && val !== "true") noMedia = true;
            }

            const getVal = (idx) => (data && idx !== -1) ? data[idx] : "";
            const getMapVal = (key) => (data && globalMappings[key].index !== -1) ? data[globalMappings[key].index] : "";

            let agendaHtml = agendaConfig.map(row => `
                <div class="session-row">
                    <div class="session-header">
                        <span class="session-label">${row.title}</span>
                        <span class="session-loc">${getVal(row.locationIdx)}</span>
                    </div>
                    <span class="session-activity">${getVal(row.activityIdx) || (data ? '' : '________________')}</span>
                </div>
            `).join('');

            let bgStyle = (noMedia && backgroundNo) ? `background-image: url('${backgroundNo}');` : (!noMedia && backgroundYes ? `background-image: url('${backgroundYes}');` : "");

            return `
                <div class="badge ${noMedia ? 'no-media' : ''} ${bgStyle ? 'has-bg' : ''}" style="${bgStyle}">
                    <div class="header">
                        <img src="${currentLogo}" class="logo" onerror="this.src='${DEFAULT_LOGO}'">
                        <div class="event-title">${eventTitle}</div>
                    </div>
                    <div class="student-name">${getMapVal('name') || (data ? '' : "John Smith")}</div>
                    <div class="student-info">${getMapVal('info1')} ${getMapVal('info2') ? '&bull; ' + getMapVal('info2') : ''}</div>
                    <div class="supervisor">${getMapVal('sub') ? 'Supervisor: ' + getMapVal('sub') : ''}</div>
                    <div class="sessions-container">
                        ${agendaHtml}
                    </div>
                </div>
            `;
        }

        function render() {
            const container = document.getElementById('badge-container');
            const codeInput = document.getElementById('templateSearch').value.trim();
            if (!codeInput) return;
            
            updateDynamicStyles();
            container.innerHTML = '';
            const t = templates[codeInput] || templates["5395"];
            const blankCount = parseInt(document.getElementById('blankCount').value) || 0;
            let allItems = [...csvData];
            for(let i=0; i<blankCount; i++) allItems.push(null);
            
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < allItems.length; i += t.perPage) {
                const page = document.createElement('div');
                page.className = 'page';
                page.innerHTML = allItems.slice(i, i + t.perPage).map(item => createBadgeHTML(item)).join('');
                fragment.appendChild(page);
            }
            container.appendChild(fragment);
            document.getElementById('status').textContent = `Generated ${allItems.length} Badges.`;
        }

        renderAgendaBuilder();
    </script>
</body>
</html>
